{% extends 'base.html' %}
{% block title %}Reset Password – AMPATH Portal{% endblock %}
{% block content %}

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fas fa-lock fa-3x mb-3"></i>
      <h2 class="fw-bold">Reset Password</h2>
      <p class="text-white-50 mb-0">Enter your new password below</p>
    </div>
    <div class="auth-body">
      <form method="POST" action="{{ url_for('reset_password', token=token) }}">
        <div class="mb-4">
          <label class="form-label fw-semibold">New Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Minimum 8 characters" required minlength="8">
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
          <i class="fas fa-save me-2"></i>Reset Password
        </button>
      </form>
      <hr class="my-4">
      <p class="text-center text-muted mb-0">
        <a href="{{ url_for('login') }}" class="text-primary fw-semibold">Back to Login</a>
      </p>
    </div>
  </div>
</div>

{% endblock %}
