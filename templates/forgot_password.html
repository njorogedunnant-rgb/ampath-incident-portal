{% extends 'base.html' %}
{% block title %}Forgot Password – AMPATH Portal{% endblock %}
{% block content %}

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fas fa-key fa-3x mb-3"></i>
      <h2 class="fw-bold">Forgot Password</h2>
      <p class="text-white-50 mb-0">Enter your email to receive a reset link</p>
    </div>
    <div class="auth-body">
      <form method="POST" action="{{ url_for('forgot_password') }}">
        <div class="mb-4">
          <label class="form-label fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
            <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
          <i class="fas fa-paper-plane me-2"></i>Send Reset Link
        </button>
      </form>
      <hr class="my-4">
      <p class="text-center text-muted mb-0">
        Remembered it? <a href="{{ url_for('login') }}" class="text-primary fw-semibold">Back to Login</a>
      </p>
    </div>
  </div>
</div>

{% endblock %}
