{% extends 'base.html' %}
{% block title %}Login – AMPATH Incident Portal{% endblock %}
{% block content %}

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fas fa-shield-alt fa-3x mb-3"></i>
      <h2 class="fw-bold">AMPATH</h2>
      <p class="text-white-50 mb-0">Cybersecurity Incident Reporting Portal</p>
    </div>
    <div class="auth-body">
      <form method="POST" action="{{ url_for('login') }}" novalidate>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
            <input type="email" name="email" class="form-control" placeholder="your@ampath.org" required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
          <i class="fas fa-sign-in-alt me-2"></i>Sign In
        </button>
      </form>
      <hr class="my-4">
      <p class="text-center text-muted mb-0">
        Don't have an account?
        <a href="{{ url_for('register') }}" class="text-primary fw-semibold">Register here</a>
      </p>
    </div>
  </div>
</div>

{% endblock %}
